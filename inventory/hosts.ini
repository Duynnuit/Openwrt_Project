# ============================================================
# Inventory - OpenWRT Firewall Test Lab (Nhóm 18 - NT131.Q22)
# ============================================================
# Chỉnh sửa IP cho phù hợp với môi trường VMware của bạn

[router]
openwrt ansible_host=192.168.1.1 ansible_user=root ansible_ssh_pass=your_password

[lan_hosts]
lan-ubuntu ansible_host=192.168.1.100 ansible_user=ubuntu ansible_ssh_pass=ubuntu

[guest_hosts]
guest-ubuntu ansible_host=192.168.2.100 ansible_user=ubuntu ansible_ssh_pass=ubuntu

# Simulated WAN attacker (host machine hoặc VM ngoài)
[wan_hosts]
wan-attacker ansible_host=192.168.0.10 ansible_user=tester ansible_ssh_pass=tester

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# Địa chỉ router trong từng zone
router_lan_ip=192.168.1.1
router_guest_ip=192.168.2.1
lan_network=192.168.1.0/24
guest_network=192.168.2.0/24
